<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ÖSYM Son Dakika – Yösarete</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:     #0f1117;
  --accent:  #e8612a;
  --red:     #dc2626;
  --amber:   #d97706;
  --green:   #16a34a;
  --blue:    #2563eb;
  --soft:    #f7f4ef;
  --white:   #ffffff;
  --border:  #e2ddd6;
  --mid:     #6b6b7b;
  --ticker-h: 44px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--soft); color: var(--ink); overflow-x: hidden; }

.ticker-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--ticker-h);
  background: var(--red);
  display: flex; align-items: center; overflow: hidden;
}
.ticker-label {
  background: var(--ink); color: #fff;
  font-size: .7rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; white-space: nowrap;
  padding: 0 18px; height: 100%;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.ticker-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; }
.ticker-inner {
  display: flex; gap: 60px; white-space: nowrap;
  animation: ticker 40s linear infinite;
  font-size: .78rem; font-weight: 500; color: #fff;
  align-items: center; padding: 0 20px;
}
.ticker-inner span::before { content: '●'; margin-right: 10px; opacity: .6; }
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
@keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0; } }

nav {
  position: fixed; top: var(--ticker-h); left: 0; right: 0; z-index: 100;
  background: rgba(247,244,239,.95); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw; height: 60px;
}
.nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--ink); text-decoration: none; }
.nav-logo span { color: var(--accent); }
.nav-links { display: flex; gap: 1.8rem; list-style: none; }
.nav-links a { font-size: .83rem; font-weight: 500; color: var(--mid); text-decoration: none; transition: color .2s; }
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-badge { background: var(--red); color: #fff; font-size: .65rem; font-weight: 700; letter-spacing: .05em; padding: 2px 8px; border-radius: 20px; animation: blink 1.5s infinite; }

.hero-band {
  margin-top: calc(var(--ticker-h) + 60px);
  background: var(--ink); color: #fff;
  padding: 48px 5vw 40px; position: relative; overflow: hidden;
}
.hero-band-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 60% 80% at 90% 50%, #e8612a22, transparent),
              radial-gradient(ellipse 40% 60% at 10% 80%, #dc262622, transparent);
}
.hero-band-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
.hero-eyebrow {
